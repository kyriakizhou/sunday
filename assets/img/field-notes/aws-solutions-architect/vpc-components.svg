<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-labelledby="title desc">
  <title id="title">VPC components diagram</title>
  <desc id="desc">A simplified AWS VPC showing public and private subnets, route tables, internet gateway, NAT gateway, VPC endpoints, and hybrid connectivity.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#5476a4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .ink { fill: #061d49; }
      .muted { fill: rgba(6,29,73,.58); }
      .line { fill: none; stroke: #5476a4; stroke-opacity: .38; stroke-width: 1.3; }
      .dash { fill: none; stroke: #5476a4; stroke-opacity: .34; stroke-width: 1.2; stroke-dasharray: 6 6; }
      .box { fill: rgba(84,118,164,.055); stroke: rgba(84,118,164,.38); stroke-width: 1.2; }
      .soft-blue { fill: rgba(84,118,164,.075); stroke: rgba(84,118,164,.42); stroke-width: 1.2; }
      .soft-pink { fill: rgba(236,151,181,.16); stroke: rgba(236,151,181,.6); stroke-width: 1.2; }
      .soft-yellow { fill: rgba(244,196,100,.18); stroke: rgba(244,196,100,.72); stroke-width: 1.2; }
      .label { font: 15px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .small { font: 12px "Noto Sans Mono CJK SC", monospace; fill: rgba(6,29,73,.66); }
      .center { text-anchor: middle; dominant-baseline: middle; }
      .title { font: 24px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .chip { fill: #fff; stroke: rgba(84,118,164,.45); stroke-width: 1.1; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="760" height="440"/>
  <text class="title" x="34" y="45">VPC components</text>

  <rect class="box" x="150" y="72" width="520" height="315" rx="3"/>
  <text class="label" x="170" y="101">Region</text>
  <rect class="dash" x="180" y="122" width="450" height="230" rx="3"/>
  <text class="small" x="398" y="370">Availability Zone</text>
  <rect class="box" x="205" y="145" width="400" height="182" rx="3"/>
  <text class="label" x="244" y="171">VPC</text>

  <rect class="soft-yellow" x="230" y="197" width="160" height="104" rx="3"/>
  <text class="label center" x="310" y="223">Public subnet</text>
  <rect class="soft-blue" x="425" y="197" width="155" height="104" rx="3"/>
  <text class="label center" x="502.5" y="223">Private subnet</text>

  <rect class="chip" x="250" y="246" width="56" height="34" rx="3"/>
  <text class="small center" x="278" y="263">EC2</text>
  <rect class="chip" x="450" y="243" width="78" height="34" rx="3"/>
  <text class="small center" x="489" y="260">EC2</text>
  <rect class="chip" x="333" y="156" width="66" height="28" rx="3"/>
  <text class="small center" x="366" y="170">NACL</text>
  <rect class="chip" x="506" y="156" width="66" height="28" rx="3"/>
  <text class="small center" x="539" y="170">NACL</text>
  <rect class="chip" x="252" y="309" width="95" height="28" rx="3"/>
  <text class="small center" x="299.5" y="323">route table</text>
  <rect class="chip" x="443" y="309" width="95" height="28" rx="3"/>
  <text class="small center" x="490.5" y="323">route table</text>

  <rect class="soft-pink" x="50" y="146" width="82" height="44" rx="3"/>
  <text class="small center" x="91" y="168">Internet</text>
  <rect class="chip" x="162" y="164" width="66" height="34" rx="3"/>
  <text class="small center" x="195" y="181">IGW</text>
  <rect class="chip" x="250" y="113" width="78" height="34" rx="3"/>
  <text class="small center" x="289" y="130">router</text>
  <rect class="chip" x="320" y="246" width="56" height="34" rx="3"/>
  <text class="small center" x="348" y="263">NAT</text>

  <rect class="soft-blue" x="632" y="160" width="88" height="44" rx="3"/>
  <text class="small center" x="676" y="182">S3 / logs</text>
  <rect class="chip" x="585" y="227" width="82" height="40" rx="3"/>
  <text class="small center" x="626" y="247">endpoint</text>

  <rect class="chip" x="52" y="263" width="92" height="38" rx="3"/>
  <text class="small center" x="98" y="282">Transit GW</text>
  <rect class="chip" x="52" y="317" width="92" height="38" rx="3"/>
  <text class="small center" x="98" y="336">VPN</text>
  <rect class="chip" x="632" y="312" width="88" height="38" rx="3"/>
  <text class="small center" x="676" y="331">on-prem</text>

  <path class="line" d="M132 168 L162 181" marker-end="url(#arrow)"/>
  <path class="line" d="M228 181 L250 132" marker-end="url(#arrow)"/>
  <path class="line" d="M289 147 L278 246" marker-end="url(#arrow)"/>
  <path class="line" d="M376 263 C410 263 421 255 450 260" marker-end="url(#arrow)"/>
  <path class="line" d="M528 260 L585 247" marker-end="url(#arrow)"/>
  <path class="line" d="M667 247 C688 238 695 220 676 204" marker-end="url(#arrow)"/>
  <path class="line" d="M144 282 C170 280 178 255 195 197" marker-end="url(#arrow)"/>
  <path class="line" d="M144 336 C170 330 184 302 206 280" marker-end="url(#arrow)"/>
  <path class="line" d="M667 331 C635 318 625 290 626 267" marker-end="url(#arrow)"/>
</svg>
