<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-labelledby="title desc">
  <title id="title">Launch template and configuration components</title>
  <desc id="desc">Shared launch configuration inputs and launch template specific features feeding an Auto Scaling Group.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#5476a4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .title { font: 23px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .label { font: 15px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .small { font: 12px "Noto Sans Mono CJK SC", monospace; fill: rgba(6,29,73,.66); }
      .panel { fill: rgba(84,118,164,.055); stroke: rgba(84,118,164,.4); stroke-width: 1.2; }
      .panel-pink { fill: rgba(236,151,181,.14); stroke: rgba(236,151,181,.6); stroke-width: 1.2; }
      .chip { fill: #fff; stroke: rgba(84,118,164,.46); stroke-width: 1.1; }
      .line { fill: none; stroke: #5476a4; stroke-opacity: .42; stroke-width: 1.3; }
    </style>
  </defs>
  <rect class="bg" width="700" height="520"/>
  <text class="title" x="34" y="42">Launch template / configuration</text>

  <rect class="panel" x="58" y="76" width="278" height="386" rx="3"/>
  <text class="label" x="82" y="108">Shared launch settings</text>
  <rect class="chip" x="96" y="132" width="88" height="32" rx="3"/><text class="small" x="119" y="153">AMI ID</text>
  <rect class="chip" x="96" y="174" width="142" height="32" rx="3"/><text class="small" x="119" y="195">Instance type</text>
  <rect class="chip" x="96" y="216" width="150" height="32" rx="3"/><text class="small" x="119" y="237">Security groups</text>
  <rect class="chip" x="96" y="258" width="96" height="32" rx="3"/><text class="small" x="119" y="279">Key pair</text>
  <rect class="chip" x="96" y="300" width="166" height="32" rx="3"/><text class="small" x="119" y="321">Storage config</text>
  <rect class="chip" x="96" y="342" width="180" height="32" rx="3"/><text class="small" x="119" y="363">IAM instance profile</text>
  <rect class="chip" x="96" y="384" width="154" height="32" rx="3"/><text class="small" x="119" y="405">Network settings</text>
  <rect class="chip" x="96" y="426" width="118" height="28" rx="3"/><text class="small" x="119" y="445">User data</text>

  <rect class="panel-pink" x="402" y="108" width="240" height="266" rx="3"/>
  <text class="label" x="426" y="141">Template-only features</text>
  <rect class="chip" x="440" y="166" width="160" height="32" rx="3"/><text class="small" x="461" y="187">Version management</text>
  <rect class="chip" x="440" y="208" width="168" height="32" rx="3"/><text class="small" x="461" y="229">Spot options</text>
  <rect class="chip" x="440" y="250" width="174" height="32" rx="3"/><text class="small" x="461" y="271">Capacity reservations</text>
  <rect class="chip" x="440" y="292" width="148" height="32" rx="3"/><text class="small" x="461" y="313">Elastic graphics</text>
  <rect class="chip" x="440" y="334" width="176" height="32" rx="3"/><text class="small" x="461" y="355">Mixed instance types</text>

  <rect class="panel" x="238" y="468" width="236" height="40" rx="3"/>
  <text class="label" x="285" y="494">Auto Scaling Group</text>
  <path class="line" d="M197 462 C206 474 226 481 238 488" marker-end="url(#arrow)"/>
  <path class="line" d="M522 374 C506 438 482 471 474 487" marker-end="url(#arrow)"/>
</svg>
