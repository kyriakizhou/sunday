<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 390" role="img" aria-labelledby="title desc">
  <title id="title">ECS deployment across availability zones</title>
  <desc id="desc">ECR, task definition, ECS service, load balancers, container instances, and tasks spread across two availability zones.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#5476a4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .title { font: 23px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .label { font: 14px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .small { font: 11px "Noto Sans Mono CJK SC", monospace; fill: rgba(6,29,73,.66); }
      .outer { fill: rgba(84,118,164,.045); stroke: rgba(84,118,164,.38); stroke-width: 1.2; }
      .az { fill: rgba(84,118,164,.045); stroke: rgba(84,118,164,.34); stroke-width: 1.1; }
      .private { fill: rgba(84,118,164,.08); stroke: rgba(84,118,164,.42); stroke-width: 1.1; }
      .public { fill: rgba(244,196,100,.14); stroke: rgba(244,196,100,.72); stroke-width: 1.1; }
      .service { fill: rgba(236,151,181,.16); stroke: rgba(236,151,181,.62); stroke-width: 1.1; }
      .chip { fill: #fff; stroke: rgba(84,118,164,.46); stroke-width: 1.1; }
      .line { fill: none; stroke: #5476a4; stroke-opacity: .42; stroke-width: 1.2; }
    </style>
  </defs>
  <rect class="bg" width="840" height="390"/>
  <text class="title" x="34" y="42">ECS service deployment</text>
  <rect class="outer" x="34" y="64" width="772" height="292" rx="4"/>
  <text class="small" x="52" y="88">AWS region / VPC</text>

  <rect class="chip" x="72" y="108" width="128" height="38" rx="3"/><text class="small" x="94" y="131">ECR registry</text>
  <rect class="chip" x="350" y="86" width="142" height="54" rx="3"/><text class="small" x="372" y="109">Task definition</text><text class="small" x="372" y="126">containers + CPU</text>
  <rect class="service" x="358" y="176" width="128" height="54" rx="3"/><text class="small" x="386" y="199">ECS service</text><text class="small" x="374" y="216">desired count</text>

  <rect class="az" x="62" y="174" width="268" height="154" rx="3"/>
  <text class="small" x="78" y="196">Availability Zone 1</text>
  <rect class="private" x="80" y="214" width="112" height="88" rx="3"/><text class="small" x="94" y="236">private subnet</text>
  <rect class="chip" x="98" y="250" width="78" height="32" rx="3"/><text class="small" x="113" y="271">task 1</text>
  <rect class="public" x="206" y="214" width="104" height="88" rx="3"/><text class="small" x="224" y="236">public subnet</text>
  <rect class="chip" x="226" y="250" width="64" height="32" rx="3"/><text class="small" x="242" y="271">ALB</text>

  <rect class="az" x="510" y="174" width="268" height="154" rx="3"/>
  <text class="small" x="526" y="196">Availability Zone 2</text>
  <rect class="private" x="528" y="214" width="112" height="88" rx="3"/><text class="small" x="542" y="236">private subnet</text>
  <rect class="chip" x="546" y="250" width="78" height="32" rx="3"/><text class="small" x="561" y="271">task 2</text>
  <rect class="public" x="654" y="214" width="104" height="88" rx="3"/><text class="small" x="672" y="236">public subnet</text>
  <rect class="chip" x="674" y="250" width="64" height="32" rx="3"/><text class="small" x="690" y="271">ALB</text>

  <path class="line" d="M200 127 C252 128 300 124 350 113" marker-end="url(#arrow)"/>
  <path class="line" d="M421 140 L421 176" marker-end="url(#arrow)"/>
  <path class="line" d="M358 203 C292 208 230 222 176 250" marker-end="url(#arrow)"/>
  <path class="line" d="M486 203 C542 210 579 226 586 250" marker-end="url(#arrow)"/>
  <path class="line" d="M226 266 L176 266" marker-end="url(#arrow)"/>
  <path class="line" d="M674 266 L624 266" marker-end="url(#arrow)"/>
</svg>
