<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-labelledby="title desc">
  <title id="title">ECS cluster on EC2 instances</title>
  <desc id="desc">Two EC2 instances in an ECS cluster, each running the ECS agent, Docker daemon, and containers.</desc>
  <defs>
    <style>
      .bg { fill: #fff; }
      .title { font: 23px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .label { font: 16px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .small { font: 13px "Noto Sans Mono CJK SC", monospace; fill: rgba(6,29,73,.68); }
      .cluster { fill: rgba(84,118,164,.055); stroke: rgba(84,118,164,.42); stroke-width: 1.3; }
      .instance { fill: rgba(244,196,100,.14); stroke: rgba(244,196,100,.72); stroke-width: 1.2; }
      .agent { fill: rgba(236,151,181,.16); stroke: rgba(236,151,181,.62); stroke-width: 1.1; }
      .daemon { fill: rgba(84,118,164,.09); stroke: rgba(84,118,164,.45); stroke-width: 1.1; }
      .task { fill: #fff; stroke: rgba(84,118,164,.46); stroke-width: 1.1; }
    </style>
  </defs>
  <rect class="bg" width="720" height="430"/>
  <text class="title" x="34" y="42">ECS cluster</text>
  <rect class="cluster" x="44" y="70" width="632" height="316" rx="4"/>
  <text class="small" x="62" y="96">cluster boundary</text>

  <g transform="translate(86 118)">
    <rect class="instance" x="0" y="0" width="246" height="222" rx="4"/>
    <text class="label" x="58" y="33">EC2 instance</text>
    <rect class="agent" x="28" y="56" width="190" height="34" rx="3"/>
    <text class="small" x="86" y="78">ECS agent</text>
    <rect class="daemon" x="28" y="104" width="190" height="34" rx="3"/>
    <text class="small" x="78" y="126">Docker daemon</text>
    <rect class="task" x="28" y="156" width="84" height="42" rx="3"/>
    <text class="small" x="47" y="181">task 1</text>
    <rect class="task" x="134" y="156" width="84" height="42" rx="3"/>
    <text class="small" x="153" y="181">task 2</text>
  </g>

  <g transform="translate(388 118)">
    <rect class="instance" x="0" y="0" width="246" height="222" rx="4"/>
    <text class="label" x="58" y="33">EC2 instance</text>
    <rect class="agent" x="28" y="56" width="190" height="34" rx="3"/>
    <text class="small" x="86" y="78">ECS agent</text>
    <rect class="daemon" x="28" y="104" width="190" height="34" rx="3"/>
    <text class="small" x="78" y="126">Docker daemon</text>
    <rect class="task" x="28" y="156" width="84" height="42" rx="3"/>
    <text class="small" x="47" y="181">task 3</text>
    <rect class="task" x="134" y="156" width="84" height="42" rx="3"/>
    <text class="small" x="153" y="181">task 4</text>
  </g>
</svg>
