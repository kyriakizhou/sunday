<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 430" role="img" aria-labelledby="title desc">
  <title id="title">IAM Identity Center SAML flow</title>
  <desc id="desc">A seven step SAML sign-in flow from user browser to identity provider, AWS SSO endpoint, STS, and AWS console.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#5476a4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .title { font: 23px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .label { font: 14px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .small { font: 11px "Noto Sans Mono CJK SC", monospace; fill: rgba(6,29,73,.66); }
      .zone { fill: rgba(84,118,164,.045); stroke: rgba(84,118,164,.38); stroke-width: 1.2; }
      .aws { fill: rgba(236,151,181,.13); stroke: rgba(236,151,181,.58); stroke-width: 1.2; }
      .chip { fill: #fff; stroke: rgba(84,118,164,.48); stroke-width: 1.1; }
      .soft { fill: rgba(244,196,100,.16); stroke: rgba(244,196,100,.72); stroke-width: 1.1; }
      .line { fill: none; stroke: #5476a4; stroke-opacity: .44; stroke-width: 1.3; }
      .step { fill: #fff; stroke: rgba(236,151,181,.78); stroke-width: 1.3; }
      .steptext { font: 11px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
    </style>
  </defs>
  <rect class="bg" width="840" height="430"/>
  <text class="title" x="34" y="42">SAML sign-in flow</text>
  <rect class="zone" x="42" y="76" width="378" height="292" rx="6"/>
  <text class="label" x="66" y="105">Organization / identity provider</text>
  <rect class="aws" x="506" y="76" width="292" height="292" rx="6"/>
  <text class="label" x="536" y="105">AWS service provider</text>

  <rect class="soft" x="90" y="270" width="112" height="44" rx="3"/><text class="small" x="111" y="296">Browser</text>
  <rect class="chip" x="244" y="144" width="118" height="44" rx="3"/><text class="small" x="264" y="169">Portal / IdP</text>
  <rect class="chip" x="86" y="144" width="118" height="44" rx="3"/><text class="small" x="105" y="169">LDAP store</text>
  <rect class="soft" x="548" y="144" width="118" height="44" rx="3"/><text class="small" x="569" y="169">SSO endpoint</text>
  <rect class="chip" x="700" y="144" width="64" height="44" rx="3"/><text class="small" x="718" y="169">STS</text>
  <rect class="chip" x="588" y="270" width="140" height="44" rx="3"/><text class="small" x="606" y="296">AWS console</text>

  <path class="line" d="M202 292 C242 262 267 226 294 188" marker-end="url(#arrow)"/>
  <path class="line" d="M244 166 L204 166" marker-end="url(#arrow)"/>
  <path class="line" d="M303 188 L303 236 C303 266 244 286 202 292" marker-end="url(#arrow)"/>
  <path class="line" d="M362 166 C430 166 492 166 548 166" marker-end="url(#arrow)"/>
  <path class="line" d="M666 166 L700 166" marker-end="url(#arrow)"/>
  <path class="line" d="M606 188 C592 218 586 244 602 270" marker-end="url(#arrow)"/>
  <path class="line" d="M202 292 C326 354 504 350 612 314" marker-end="url(#arrow)"/>

  <circle class="step" cx="222" cy="270" r="13"/><text class="steptext" x="219" y="274">1</text>
  <circle class="step" cx="224" cy="174" r="13"/><text class="steptext" x="221" y="178">2</text>
  <circle class="step" cx="320" cy="218" r="13"/><text class="steptext" x="317" y="222">3</text>
  <circle class="step" cx="452" cy="158" r="13"/><text class="steptext" x="449" y="162">4</text>
  <circle class="step" cx="684" cy="166" r="13"/><text class="steptext" x="681" y="170">5</text>
  <circle class="step" cx="592" cy="226" r="13"/><text class="steptext" x="589" y="230">6</text>
  <circle class="step" cx="482" cy="340" r="13"/><text class="steptext" x="479" y="344">7</text>
</svg>
