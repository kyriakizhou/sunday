<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" role="img" aria-labelledby="title desc">
  <title id="title">EKS cluster hierarchy</title>
  <desc id="desc">An EKS cluster with managed control plane, worker nodes, namespaces, and pods.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1 L7 4 L1 7" fill="none" stroke="#5476a4" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .title { font: 23px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .label { font: 15px "Noto Sans Mono CJK SC", monospace; fill: #061d49; }
      .small { font: 12px "Noto Sans Mono CJK SC", monospace; fill: rgba(6,29,73,.66); }
      .box { fill: rgba(84,118,164,.055); stroke: rgba(84,118,164,.42); stroke-width: 1.2; }
      .pink { fill: rgba(236,151,181,.16); stroke: rgba(236,151,181,.62); stroke-width: 1.2; }
      .yellow { fill: rgba(244,196,100,.16); stroke: rgba(244,196,100,.72); stroke-width: 1.2; }
      .blue { fill: rgba(84,118,164,.09); stroke: rgba(84,118,164,.45); stroke-width: 1.2; }
      .pod { fill: #fff; stroke: rgba(84,118,164,.48); stroke-width: 1.1; }
      .line { fill: none; stroke: #5476a4; stroke-opacity: .42; stroke-width: 1.3; }
    </style>
  </defs>
  <rect class="bg" width="760" height="390"/>
  <text class="title" x="34" y="42">EKS cluster</text>
  <rect class="pink" x="304" y="70" width="152" height="38" rx="3"/>
  <text class="label" x="329" y="94">EKS Cluster</text>

  <rect class="blue" x="90" y="155" width="218" height="70" rx="3"/>
  <text class="label" x="134" y="182">Control plane</text>
  <rect class="pod" x="104" y="193" width="58" height="24" rx="3"/><text class="small" x="116" y="210">API</text>
  <rect class="pod" x="176" y="193" width="58" height="24" rx="3"/><text class="small" x="188" y="210">etcd</text>
  <rect class="pod" x="248" y="193" width="48" height="24" rx="3"/><text class="small" x="256" y="210">sched</text>

  <rect class="blue" x="452" y="155" width="220" height="70" rx="3"/>
  <text class="label" x="500" y="182">Worker nodes</text>
  <rect class="pod" x="478" y="193" width="64" height="24" rx="3"/><text class="small" x="493" y="210">node 1</text>
  <rect class="pod" x="582" y="193" width="64" height="24" rx="3"/><text class="small" x="597" y="210">node 2</text>

  <rect class="yellow" x="80" y="276" width="185" height="70" rx="3"/>
  <text class="small" x="105" y="302">namespace: dev</text>
  <rect class="pod" x="110" y="314" width="55" height="24" rx="3"/><text class="small" x="122" y="331">pod 3</text>
  <rect class="pod" x="182" y="314" width="55" height="24" rx="3"/><text class="small" x="194" y="331">pod 4</text>

  <rect class="box" x="288" y="276" width="185" height="70" rx="3"/>
  <text class="small" x="314" y="302">namespace: prod</text>
  <rect class="pod" x="318" y="314" width="55" height="24" rx="3"/><text class="small" x="330" y="331">pod 1</text>
  <rect class="pod" x="390" y="314" width="55" height="24" rx="3"/><text class="small" x="402" y="331">pod 2</text>

  <rect class="pink" x="496" y="276" width="185" height="70" rx="3"/>
  <text class="small" x="515" y="302">namespace: system</text>
  <rect class="pod" x="528" y="314" width="56" height="24" rx="3"/><text class="small" x="538" y="331">system</text>
  <rect class="pod" x="606" y="314" width="55" height="24" rx="3"/><text class="small" x="616" y="331">dns</text>

  <path class="line" d="M334 108 C285 128 246 137 199 155" marker-end="url(#arrow)"/>
  <path class="line" d="M426 108 C472 128 516 137 562 155" marker-end="url(#arrow)"/>
  <path class="line" d="M510 225 C424 242 382 255 380 276" marker-end="url(#arrow)"/>
  <path class="line" d="M510 225 C330 238 190 246 172 276" marker-end="url(#arrow)"/>
  <path class="line" d="M614 225 C606 244 596 257 588 276" marker-end="url(#arrow)"/>
</svg>
